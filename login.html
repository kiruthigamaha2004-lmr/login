<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
        }

        .login-box{
            width:350px;
            background:#fff;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .login-box h2{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        .input-group{
            margin-bottom:18px;
        }

        .input-group label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
            color:#555;
        }

        .input-group input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
            outline:none;
        }

        .input-group input:focus{
            border-color:#4facfe;
        }

        .remember{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
            font-size:14px;
        }

        .remember a{
            text-decoration:none;
            color:#007BFF;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#007BFF;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#0056b3;
        }

        .signup{
            text-align:center;
            margin-top:20px;
            font-size:14px;
        }

        .signup a{
            color:#007BFF;
            text-decoration:none;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    <form action="#" method="post">

        <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <div class="remember">
            <label>
                <input type="checkbox">
                Remember Me
            </label>

            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit">Login</button>

        <div class="signup">
            Don't have an account?
            <a href="#">Sign Up</a>
        </div>

    </form>
</div>

</body>
</html>
